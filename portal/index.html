<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5efe3">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="dev-nexus">
  <meta name="description" content="Proyectos web de zaswear">
  <title>dev-nexus · zaswear</title>
  <link rel="manifest" href="manifest.json">
  <!-- Favicon: hoja SVG personalizada -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='%23f7f2e8'/><path d='M10 24C13 16 21 10 24 10 18 14 12 19 10 24Z' fill='%234a7050'/><line x1='16' y1='24' x2='17' y2='11' stroke='%234a7050' stroke-width='1.5' stroke-linecap='round'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <style>
    /* ===== PALETA · sepia profundo (modo único) ===== */
    :root {
      --cream: #f5efe3;
      --cream-soft: #fffdf9;
      --cream-card: #fbf8f1;
      --cream-border: rgba(60, 50, 40, 0.10);
      --ink: #23201a;
      --ink-mid: rgba(42, 38, 32, 0.62);
      --ink-faint: rgba(42, 38, 32, 0.45);
      --green: #4a7050;
      --green-mid: #3c5a42;
      --gold: #b89040;
      --blue: #6080a0;
      --terra: #b86040;
      --mauve: #8060a0;
      --teal: #408080;
      --dots-opacity: 0.5;
      --season-accent: var(--green);
    }

    /* ===== ACENTOS ESTACIONALES ===== */
    [data-season="spring"] { --season-accent: #d090a0; }
    [data-season="summer"] { --season-accent: #d4a850; }
    [data-season="autumn"] { --season-accent: #d07050; }
    [data-season="winter"] { --season-accent: #90a8c0; }

    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== SMOOTH THEME TRANSITIONS ===== */
    body,
    .card,
    .ctrl-btn,
    header,
    footer,
    .rule,
    #install-banner,
    #install-btn {
      transition: background-color 0.5s ease, color 0.5s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    /* ===== BODY ===== */
    body {
      background-color: var(--cream);
      background-image:
        radial-gradient(120% 80% at 85% -10%, rgba(96, 128, 160, 0.10), transparent 55%),
        radial-gradient(100% 70% at 0% 110%, rgba(74, 112, 80, 0.08), transparent 50%);
      color: var(--ink);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* Dot grid — cuaderno Leuchtturm */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--cream-border) 1.2px, transparent 1.2px);
      background-size: 22px 22px;
      opacity: var(--dots-opacity);
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.5s ease;
    }

    /* Botanical glows */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 45% 40% at 5% 10%, rgba(74, 112, 80, 0.13) 0%, transparent 70%),
        radial-gradient(ellipse 35% 35% at 95% 85%, rgba(74, 112, 80, 0.10) 0%, transparent 70%),
        radial-gradient(ellipse 28% 28% at 88% 8%, rgba(184, 144, 64, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== CANVAS (partículas estacionales) ===== */
    #particle-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ===== BOTANICAL CORNERS ===== */
    .leaf-tl,
    .leaf-br {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.5s ease;
    }

    .leaf-tl {
      top: -12px;
      left: -12px;
      width: 170px;
      opacity: 0.10;
      transform: rotate(8deg);
    }

    .leaf-br {
      bottom: -12px;
      right: -12px;
      width: 150px;
      opacity: 0.08;
      transform: rotate(-168deg);
    }

    /* ===== CONSTELLATION ===== */
    .stars {
      position: fixed;
      top: 0;
      right: 0;
      width: 210px;
      height: 210px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.5s ease;
    }

    /* ===== WRAPPER ===== */
    .wrapper {
      position: relative;
      z-index: 2;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ===== CONTROLS (modo oscuro + sonido) ===== */
    .controls {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .ctrl-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--cream-border);
      background: var(--cream-soft);
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(44, 36, 25, 0.08);
      user-select: none;
    }

    .ctrl-btn:active {
      transform: scale(0.88);
    }

    /* ===== HEADER ===== */
    header {
      padding: 50px 24px 18px;
    }

    .logo-line {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.1s forwards;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2.5s ease infinite;
      flex-shrink: 0;
      transition: background-color 0.5s;
    }

    .logo-text {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--green);
      transition: color 0.5s;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(36px, 9vw, 56px);
      font-weight: 600;
      line-height: 0.98;
      letter-spacing: -0.025em;
      color: var(--ink);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s forwards;
    }

    h1 em {
      font-style: italic;
      font-weight: 700;
      color: var(--season-accent);
      transition: color 0.5s;
    }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: 0.10em;
      margin-top: 14px;
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.3s forwards;
    }

    .subtitle b {
      color: var(--green-mid);
      font-weight: 400;
      transition: color 0.5s;
    }

    .status-bar {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
      margin-top: 8px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.4s forwards;
      user-select: none;
      transition: color 0.5s;
    }

    /* ===== DIVIDER ===== */
    .rule {
      margin: 22px 24px 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cream-border) 25%, var(--cream-border) 75%, transparent);
      opacity: 0;
      animation: fadeIn 0.6s ease 0.5s forwards;
      position: relative;
    }

    .rule::after {
      content: '✦';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 9px;
      color: var(--cream-border);
      background: var(--cream);
      padding: 0 6px;
      transition: color 0.5s, background-color 0.5s;
    }

    /* ===== BENTO GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 152px;
      grid-auto-flow: row dense;
      gap: 12px;
      padding: 20px 16px 12px;
    }

    /* Spans por tamaño (lo asigna projects.json → .card--lg/md/sm) */
    .card--lg { grid-column: span 2; grid-row: span 2; }
    .card--md { grid-column: span 2; grid-row: span 1; }
    .card--sm { grid-column: span 1; grid-row: span 1; }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: 1fr; grid-auto-rows: 150px; }
      .card--lg, .card--md { grid-column: span 1; }
      .card--lg { grid-row: span 2; }
    }

    .card {
      position: relative;
      background: var(--cream-soft);
      border: 1px solid var(--cream-border);
      border-radius: 20px;
      padding: 16px 14px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      height: 100%;
      min-height: 0;
      box-shadow: 0 1px 2px rgba(40, 30, 20, 0.04);
      opacity: 0;
      transform: translateY(12px);
      transition:
        background-color 0.5s ease,
        color 0.5s ease,
        border-color 0.25s ease,
        transform 0.18s ease,
        box-shadow 0.25s ease;
    }

    /* top accent stripe */
    .card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 18px;
      right: 18px;
      height: 2px;
      border-radius: 0 0 2px 2px;
      background: var(--card-color, var(--green));
      opacity: 0.45;
      transition: opacity 0.2s, left 0.2s, right 0.2s;
    }

    /* glow orb */
    .card::before {
      content: '';
      position: absolute;
      bottom: -24px;
      right: -24px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--card-color, var(--green));
      opacity: 0.07;
      filter: blur(30px);
      transition: opacity 0.2s;
    }

    .card:nth-child(1) {
      animation: fadeUp 0.4s ease 0.52s forwards;
    }

    .card:nth-child(2) {
      animation: fadeUp 0.4s ease 0.58s forwards;
    }

    .card:nth-child(3) {
      animation: fadeUp 0.4s ease 0.64s forwards;
    }

    .card:nth-child(4) {
      animation: fadeUp 0.4s ease 0.70s forwards;
    }

    .card:nth-child(5) {
      animation: fadeUp 0.4s ease 0.76s forwards;
    }

    .card:nth-child(6) {
      animation: fadeUp 0.4s ease 0.82s forwards;
    }

    .card:nth-child(7) {
      animation: fadeUp 0.4s ease 0.88s forwards;
    }

    .card:nth-child(8) {
      animation: fadeUp 0.4s ease 0.94s forwards;
    }

    .card:nth-child(9) {
      animation: fadeUp 0.4s ease 1.00s forwards;
    }

    .card:nth-child(10) {
      animation: fadeUp 0.4s ease 1.06s forwards;
    }

    .card:nth-child(11) {
      animation: fadeUp 0.4s ease 1.12s forwards;
    }

    .card:nth-child(12) {
      animation: fadeUp 0.4s ease 1.18s forwards;
    }

    .card:nth-child(13) {
      animation: fadeUp 0.4s ease 1.24s forwards;
    }

    .card:active {
      transform: scale(0.965);
      border-color: var(--card-color, var(--green));
    }

    .card:active::after {
      opacity: 1;
      left: 0;
      right: 0;
    }

    .card:active::before {
      opacity: 0.16;
    }

    /* hover (escritorio) — elevación + sombra del color de la tarjeta.
       !important para ganar a la animación de entrada con fill forwards. */
    @media (hover: hover) {
      .card:hover {
        transform: translateY(-6px) !important;
        border-color: var(--card-color, var(--green)) !important;
        box-shadow: 0 22px 44px -16px color-mix(in srgb, var(--card-color, var(--green)) 45%, transparent) !important;
      }

      .card:hover::after {
        opacity: 1;
        left: 0;
        right: 0;
      }

      .card:hover::before {
        opacity: 0.16;
      }
    }

    /* ===== WARP CLICK ANIMATION ===== */
    @keyframes warp {
      0% {
        transform: scale(1);
        filter: brightness(1);
        opacity: 1;
      }

      35% {
        transform: scale(0.94);
        filter: brightness(1.45);
        opacity: 1;
      }

      65% {
        transform: scale(1.03);
        filter: brightness(0.85);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        filter: brightness(1);
        opacity: 0.6;
      }
    }

    .card.warping {
      animation: warp 0.32s ease forwards !important;
      pointer-events: none;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-num {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--card-color, var(--green));
      letter-spacing: 0.1em;
      opacity: 0.75;
      display: flex;
      align-items: center;
    }

    .status-indicator {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-left: 6px;
      background-color: var(--ink-faint);
      opacity: 0.4;
      transition: background-color 0.3s, box-shadow 0.3s, opacity 0.3s;
    }

    .status-indicator.up {
      background-color: #7bbf86;
      box-shadow: 0 0 6px #7bbf86;
      opacity: 1;
    }

    .status-indicator.down {
      background-color: #d9694f;
      box-shadow: 0 0 6px #d9694f;
      opacity: 1;
    }

    .card-icon {
      width: 50px;
      height: 50px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      font-size: 26px;
      line-height: 1;
      background: color-mix(in srgb, var(--card-color, var(--green)) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--card-color, var(--green)) 20%, transparent);
    }

    .card-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--ink);
      transition: color 0.5s;
    }

    .card-tag {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 4px;
    }

    /* ===== LIVE WIDGET (dato en vivo de la propia app) ===== */
    .card-live {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--green-mid);
      letter-spacing: 0.06em;
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-live::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--card-color, var(--green));
      box-shadow: 0 0 5px var(--card-color, var(--green));
      animation: blink 2.5s ease infinite;
      flex-shrink: 0;
    }

    /* ===== DESCRIPCIÓN (solo tarjetas grandes) ===== */
    .card-desc {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--ink-mid);
      line-height: 1.5;
      margin-top: 8px;
      max-width: 34ch;
      transition: color 0.5s;
    }

    /* ===== TAMAÑOS BENTO ===== */
    .card--lg { padding: 24px 22px 20px; }
    .card--lg .card-icon { width: 64px; height: 64px; border-radius: 17px; font-size: 33px; }
    .card--lg .card-name { font-size: 26px; }
    .card--lg .card-tag { font-size: 9px; margin-top: 6px; }
    .card--lg .card-live { font-size: 12px; margin-top: 12px; }
    .card--lg .card-live::before { width: 7px; height: 7px; }
    .card--lg .card-arrow { width: 26px; height: 26px; font-size: 12px; bottom: 16px; right: 16px; }
    .card--lg::before { width: 150px; height: 150px; }

    .card--md .card-icon { width: 56px; height: 56px; font-size: 30px; }
    .card--md .card-name { font-size: 18px; }

    /* En 1 columna las descripciones podrían apretar: ocultamos en muy estrecho */
    @media (max-width: 400px) {
      .card-desc { display: none; }
    }

    .card-arrow {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 21px;
      height: 21px;
      border-radius: 50%;
      border: 1px solid var(--card-color, var(--green));
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.3;
      font-size: 10px;
      color: var(--card-color, var(--green));
      transition: opacity 0.2s;
    }

    .card:active .card-arrow {
      opacity: 1;
    }

    /* ===== FOOTER ===== */
    footer {
      padding: 10px 24px 44px;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.95s forwards;
    }

    .footer-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .pulse-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2.5s ease infinite;
      flex-shrink: 0;
      transition: background-color 0.5s;
    }

    .footer-main {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--ink-faint);
      letter-spacing: 0.12em;
    }

    .footer-main a {
      color: var(--green-mid);
      text-decoration: none;
      transition: color 0.5s;
    }

    .footer-sub {
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: var(--cream-border);
      letter-spacing: 0.10em;
      padding-left: 13px;
      transition: color 0.5s;
    }

    /* ===== KEYFRAMES ===== */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.3;
        transform: scale(0.6);
      }
    }

    /* ===== INSTALL BANNER ===== */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      z-index: 100;
      background: var(--cream-soft);
      border: 1px solid var(--cream-border);
      border-radius: 14px;
      padding: 14px 16px;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 24px rgba(44, 36, 25, 0.13);
    }

    #install-banner.show {
      display: flex;
    }

    #install-banner p {
      flex: 1;
      font-size: 13px;
      line-height: 1.4;
      color: var(--ink);
    }

    #install-banner p span {
      display: block;
      font-size: 10px;
      color: var(--ink-faint);
      font-family: 'Space Mono', monospace;
      margin-top: 2px;
    }

    #install-btn {
      background: var(--green);
      color: var(--cream);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    #dismiss-btn {
      background: none;
      border: none;
      color: var(--ink-faint);
      font-size: 16px;
      cursor: pointer;
      padding: 0 2px;
    }

  </style>
</head>

<body>

  <canvas id="particle-canvas"></canvas>

  <!-- Hoja botánica — esquina superior izquierda -->
  <svg class="leaf-tl" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M15 160 C45 90, 90 45, 165 15 C90 65, 65 90, 15 160Z" fill="#4a7050" />
    <path d="M8 140 C35 85, 70 48, 148 10 C75 58, 48 85, 8 140Z" fill="#6a9472" opacity="0.6" />
    <line x1="15" y1="160" x2="165" y2="15" stroke="#4a7050" stroke-width="1.2" opacity="0.35" />
    <path d="M32 135 C55 108, 78 82, 108 52" stroke="#4a7050" stroke-width="0.8" fill="none" opacity="0.35" />
    <path d="M18 112 C44 92, 65 72, 92 42" stroke="#4a7050" stroke-width="0.6" fill="none" opacity="0.25" />
    <circle cx="75" cy="90" r="3" fill="#4a7050" opacity="0.3" />
    <circle cx="48" cy="118" r="2" fill="#6a9472" opacity="0.3" />
  </svg>

  <!-- Hoja botánica — esquina inferior derecha -->
  <svg class="leaf-br" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M15 160 C45 90, 90 45, 165 15 C90 65, 65 90, 15 160Z" fill="#4a7050" />
    <path d="M8 140 C35 85, 70 48, 148 10 C75 58, 48 85, 8 140Z" fill="#6a9472" opacity="0.55" />
    <line x1="15" y1="160" x2="165" y2="15" stroke="#4a7050" stroke-width="1.2" opacity="0.3" />
    <path d="M32 135 C55 108, 78 82, 108 52" stroke="#4a7050" stroke-width="0.8" fill="none" opacity="0.3" />
    <circle cx="75" cy="90" r="3" fill="#4a7050" opacity="0.25" />
  </svg>

  <!-- Constelación — ref NASA/cosmos -->

  <script>
    /* ===== ROOT (modo único: sepia profundo) ===== */
    const root = document.documentElement;

    /* ===== SEASONAL THEME ===== */
    const SEASONS = {
      spring: { months: [2, 3, 4], icon: '🌸', label: 'primavera' },
      summer: { months: [5, 6, 7], icon: '☀️', label: 'verano' },
      autumn: { months: [8, 9, 10], icon: '🍂', label: 'otoño' },
      winter: { months: [11, 0, 1], icon: '❄️', label: 'invierno' },
    };

    function getSeason() {
      const m = new Date().getMonth();
      for (const [name, s] of Object.entries(SEASONS)) {
        if (s.months.includes(m)) return name;
      }
      return 'spring';
    }

    const season = getSeason();
    root.setAttribute('data-season', season);
    // El status-bar se rellena en initProjects() (necesita el conteo de projects.json).

    /* ===== PARTICLES ===== */
    const canvas = document.getElementById('particle-canvas');
    const pCtx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); spawnParticles(); });

    const SEASON_CFG = {
      spring: {
        count: 18, shape: 'petal', upward: false,
        colors: ['#e8b0c0', '#f0c8d0', '#d4a8b8', '#f0d0dc', '#c89ab0'],
        speedYMin: 0.4, speedYMax: 1.0, swayAmp: 1.2,
        sizeMin: 3, sizeMax: 7, opMin: 0.4, opMax: 0.75,
      },
      summer: {
        count: 14, shape: 'dot', upward: true, blink: true,
        colors: ['#c8a040', '#d4b060', '#e0c070', '#b89030', '#d4c080'],
        speedYMin: -0.6, speedYMax: -0.2, swayAmp: 0.4,
        sizeMin: 1.5, sizeMax: 4, opMin: 0.1, opMax: 0.8,
      },
      autumn: {
        count: 20, shape: 'leaf', upward: false,
        colors: ['#c47040', '#b84030', '#c89030', '#904020', '#d08040', '#a06030'],
        speedYMin: 0.7, speedYMax: 1.8, swayAmp: 1.5,
        sizeMin: 5, sizeMax: 11, opMin: 0.45, opMax: 0.75,
      },
      winter: {
        count: 28, shape: 'dot', upward: false,
        colors: ['#d0d8e8', '#e0e8f0', '#c0ccdc', '#b8c8d8', '#e8eef8'],
        speedYMin: 0.3, speedYMax: 0.9, swayAmp: 0.6,
        sizeMin: 1.5, sizeMax: 4, opMin: 0.3, opMax: 0.7,
      },
    };

    const cfg = SEASON_CFG[season];
    let particles = [];

    function rand(min, max) { return min + Math.random() * (max - min); }

    function makeParticle(initial) {
      return {
        x: Math.random() * canvas.width,
        y: initial ? Math.random() * canvas.height
          : (cfg.upward ? canvas.height + 10 : -12),
        size: rand(cfg.sizeMin, cfg.sizeMax),
        speedY: rand(cfg.speedYMin, cfg.speedYMax),
        speedX: rand(-0.4, 0.4),
        sway: Math.random() * Math.PI * 2,
        swayS: rand(0.008, 0.025),
        angle: Math.random() * Math.PI * 2,
        angleS: rand(-0.035, 0.035),
        color: cfg.colors[Math.floor(Math.random() * cfg.colors.length)],
        op: rand(cfg.opMin, cfg.opMax),
        blinkD: Math.random() > 0.5 ? 1 : -1,
        blinkS: rand(0.004, 0.010),
      };
    }

    function spawnParticles() {
      particles = Array.from({ length: cfg.count }, (_, i) => makeParticle(true));
    }

    function updateParticle(p) {
      p.sway += p.swayS;
      p.x += p.speedX + Math.sin(p.sway) * cfg.swayAmp * 0.25;
      p.y += p.speedY;
      p.angle += p.angleS;

      if (cfg.blink) {
        p.op += p.blinkD * p.blinkS;
        if (p.op > cfg.opMax) { p.op = cfg.opMax; p.blinkD = -1; }
        if (p.op < cfg.opMin) { p.op = cfg.opMin; p.blinkD = 1; }
      }

      const gone = cfg.upward ? p.y < -12 : p.y > canvas.height + 12;
      if (gone || p.x < -30 || p.x > canvas.width + 30) {
        Object.assign(p, makeParticle(false));
      }
    }

    function drawParticle(p) {
      pCtx.save();
      pCtx.globalAlpha = p.op;
      pCtx.translate(p.x, p.y);
      pCtx.rotate(p.angle);
      pCtx.fillStyle = p.color;

      if (cfg.shape === 'dot') {
        pCtx.beginPath();
        pCtx.arc(0, 0, p.size, 0, Math.PI * 2);
        pCtx.fill();
      } else if (cfg.shape === 'petal') {
        pCtx.beginPath();
        pCtx.ellipse(0, 0, p.size * 0.55, p.size, 0, 0, Math.PI * 2);
        pCtx.fill();
      } else if (cfg.shape === 'leaf') {
        pCtx.beginPath();
        pCtx.moveTo(0, -p.size);
        pCtx.quadraticCurveTo(p.size * 0.75, 0, 0, p.size);
        pCtx.quadraticCurveTo(-p.size * 0.75, 0, 0, -p.size);
        pCtx.fill();
      }
      pCtx.restore();
    }

    function animLoop() {
      pCtx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { updateParticle(p); drawParticle(p); });
      requestAnimationFrame(animLoop);
    }

    spawnParticles();
    animLoop();

    /* ===== CARD WARP ===== */
    function setupCardWarp() {
      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', function (e) {
          if (e.ctrlKey || e.metaKey || e.shiftKey) return;
          e.preventDefault();
          const href = this.href;
          // window.open sincrónico dentro del click handler = no bloqueado por popup blocker
          const win = window.open('about:blank', '_blank');
          this.classList.add('warping');
          setTimeout(() => {
            if (win) win.location = href; else window.open(href, '_blank');
            this.classList.remove('warping');
          }, 320);
        });
      });
    }

    /* ===== SONIDO AMBIENTE — lluvia de Utrecht (Web Audio API) ===== */
    const soundBtn = document.getElementById('sound-btn');
    let audioCtx = null;
    let rainNodes = null;
    let soundOn = false;

    function buildRain() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Pink noise — Voss-McCartney
      const sr = audioCtx.sampleRate;
      const buf = audioCtx.createBuffer(1, sr * 4, sr);
      const d = buf.getChannelData(0);
      let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
      for (let i = 0; i < d.length; i++) {
        const w = Math.random() * 2 - 1;
        b0 = 0.99886 * b0 + w * 0.0555179;
        b1 = 0.99332 * b1 + w * 0.0750759;
        b2 = 0.96900 * b2 + w * 0.1538520;
        b3 = 0.86650 * b3 + w * 0.3104856;
        b4 = 0.55000 * b4 + w * 0.5329522;
        b5 = -0.7616 * b5 - w * 0.0168980;
        d[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + w * 0.5362) * 0.11;
        b6 = w * 0.115926;
      }

      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.loop = true;

      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1200;
      bp.Q.value = 0.4;

      const hs = audioCtx.createBiquadFilter();
      hs.type = 'highshelf';
      hs.frequency.value = 4000;
      hs.gain.value = 3;

      const gain = audioCtx.createGain();
      gain.gain.value = 0;

      src.connect(bp); bp.connect(hs); hs.connect(gain); gain.connect(audioCtx.destination);
      src.start();
      gain.gain.setTargetAtTime(0.22, audioCtx.currentTime, 0.8);

      return { src, gain };
    }

    function stopRain() {
      if (!rainNodes) return;
      rainNodes.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.6);
      const s = rainNodes.src;
      setTimeout(() => { try { s.stop(); } catch (e) { } }, 2000);
      rainNodes = null;
    }

    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      if (soundOn) {
        rainNodes = buildRain();
        soundBtn.textContent = '🔊';
        soundBtn.title = 'Silenciar lluvia';
      } else {
        stopRain();
        soundBtn.textContent = '🔇';
        soundBtn.title = 'Lluvia de Utrecht';
      }
    });

    /* ===== PWA INSTALL ===== */
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').classList.add('show');

    document.getElementById('install-btn').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('install-banner').classList.remove('show');
      }
    });
    document.getElementById('dismiss-btn').addEventListener('click', () => {
      document.getElementById('install-banner').classList.remove('show');
    });

    /* ===== DYNAMIC UPTIME STATUS SYNC ===== */
    /* ===== DYNAMIC UPTIME STATUS SYNC & LOCALHOST PORT CHECK ===== */
    const LOCAL_PORTS = {
      "3DPrintRadar": 8000,
      "gamecalendar": 8003,
      "mdmakeit": 8004,
      "reclip": 8005,
      "checkstatus": 8006,
      "salud360": 8008,
      "zaswear-nexus": 8002,
      "inventory": 8002
    };

    // Helper to ping a local port with a short timeout
    async function pingLocalPort(port) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), 250);
      try {
        const response = await fetch(`http://127.0.0.1:${port}/`, {
          mode: 'no-cors',
          signal: controller.signal
        });
        clearTimeout(id);
        return true;
      } catch (err) {
        clearTimeout(id);
        return false;
      }
    }

    async function syncUptime() {
      // Fetch remote monitors list from Vercel checkstatus as fallback
      let monitors = [];
      try {
        const res = await fetch("https://checkstatus-eight.vercel.app/api/monitors");
        if (res.ok) {
          monitors = await res.json();
        }
      } catch (err) {
        console.warn("Could not fetch remote monitors list:", err);
      }

      const cards = document.querySelectorAll('.card');
      for (const card of cards) {
        const pid = card.getAttribute('data-pid');
        const href = card.getAttribute('href');
        let indicator = card.querySelector('.status-indicator');

        if (!indicator) {
          const numEl = card.querySelector('.card-num');
          if (numEl) {
            indicator = document.createElement('span');
            indicator.className = 'status-indicator';
            numEl.appendChild(indicator);
          }
        }

        if (!indicator) continue;

        // 1. Try Local Port Check First if mapped
        if (pid && LOCAL_PORTS[pid]) {
          const localPort = LOCAL_PORTS[pid];
          const isLocalUp = await pingLocalPort(localPort);
          if (isLocalUp) {
            indicator.className = "status-indicator up";
            indicator.title = `Localhost: Activo (Puerto ${localPort})`;
            continue; // Skip remote check since local is active!
          }
        }

        // 2. Fallback to Remote Monitor Status Check
        if (href) {
          const match = monitors.find(m => {
            const cleanMUrl = m.url.replace(/\/$/, "").toLowerCase();
            const cleanHref = href.replace(/\/$/, "").toLowerCase();
            return cleanMUrl.includes(cleanHref) || cleanHref.includes(cleanMUrl);
          });

          if (match) {
            const isUp = match.active && match.consecutiveFailures === 0;
            indicator.className = `status-indicator ${isUp ? 'up' : 'down'}`;
            indicator.title = isUp 
              ? `Online (Producción) · Latencia: ${match.lastLatencyMs || 'N/A'}ms` 
              : `Offline (Producción) · Estado: ${match.lastStatus || 'ERR'}`;
          } else {
            // No local port up, and no remote monitor match
            indicator.className = "status-indicator";
            indicator.title = "Estado local y remoto desconocido";
          }
        }
      }
    }
    
    /* ═══════════════════════════════════════════════════════════════════
       DATA-DRIVEN HUB — los proyectos viven en projects.json
       Render del grid + tarjetas-widget con dato en vivo de cada app.
       ═══════════════════════════════════════════════════════════════════ */
    const GRID = document.getElementById('grid');

    // Escape mínimo para texto inyectado desde el JSON
    function esc(s) {
      return String(s).replace(/[&<>"]/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
      ));
    }

    function cardHTML(p, label, i) {
      const delay = (0.52 + i * 0.06).toFixed(2);
      const util = p.type === 'utility' ? ' card-utility' : '';
      const size = ' card--' + (p.size || 'sm');
      const live = p.widget ? `<div class="card-live" data-live hidden></div>` : '';
      const desc = p.desc ? `<div class="card-desc">${esc(p.desc)}</div>` : '';
      return `<a class="card${size}${util}" href="${esc(p.url)}" target="_blank" rel="noopener"
          style="--card-color:${esc(p.color)}; animation: fadeUp 0.4s ease ${delay}s forwards;"
          aria-label="Abrir ${esc(p.name)}" data-pid="${esc(p.id)}" data-category="${esc(p.category || '')}">
        <div class="card-top">
          <div class="card-icon">${esc(p.icon)}</div>
          <div class="card-num">[${label}]</div>
        </div>
        <div>
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-tag">${esc(p.tag)}</div>
          ${desc}
          ${live}
        </div>
        <div class="card-arrow">↗</div>
      </a>`;
    }

    function renderCards(data) {
      let proj = 0, util = 0;
      GRID.innerHTML = data.map((p, i) => {
        const label = p.type === 'utility'
          ? 'U' + (++util)
          : String(++proj).padStart(2, '0');
        return cardHTML(p, label, i);
      }).join('');
      return { proj, util };
    }

    /* ── BENTO AUTO-FILL ──────────────────────────────────────────────────
       Coloca las fichas (dense first-fit) y luego rellena cualquier hueco
       haciendo crecer la ficha vecina menos disruptiva, para que el bento
       acabe SIEMPRE como un rectángulo lleno (sin fichas sobresaliendo). */
    const SIZE_WH = { lg: [2, 2], md: [2, 1], sm: [1, 1] };

    function packBento(items, cols) {
      const grid = [];
      const place = [];
      const row = r => grid[r] || (grid[r] = new Array(cols).fill(-1));
      const free = (r, c, w, h) => {
        if (c < 0 || r < 0 || w <= 0 || h <= 0 || c + w > cols) return false;
        for (let y = r; y < r + h; y++) {
          const g = grid[y];
          if (g) for (let x = c; x < c + w; x++) if (g[x] !== -1) return false;
        }
        return true;
      };
      const set = (r, c, w, h, i) => {
        for (let y = r; y < r + h; y++) { row(y); for (let x = c; x < c + w; x++) grid[y][x] = i; }
      };

      // 1) Colocación dense (primer hueco libre, fila por fila)
      items.forEach((it, i) => {
        const w = Math.max(1, Math.min(it.w, cols)), h = Math.max(1, it.h);
        let r = 0;
        for (; ;) {
          row(r);
          let done = false;
          for (let c = 0; c <= cols - w; c++) {
            if (free(r, c, w, h)) { set(r, c, w, h, i); place[i] = { r, c, w, h }; done = true; break; }
          }
          if (done) break;
          r++;
        }
      });

      // 2) Rellenar huecos del rectángulo R×cols creciendo el vecino óptimo
      const R = grid.length;
      for (let r = 0; r < R; r++) {
        row(r);
        for (let c = 0; c < cols; c++) {
          if (grid[r][c] !== -1) continue;
          const cands = [];
          if (c > 0 && grid[r][c - 1] !== -1) { const i = grid[r][c - 1], p = place[i]; if (free(p.r, p.c + p.w, 1, p.h)) cands.push({ nw: p.w + 1, nh: p.h, apply: () => { set(p.r, p.c + p.w, 1, p.h, i); p.w++; } }); }
          if (r > 0 && grid[r - 1][c] !== -1) { const i = grid[r - 1][c], p = place[i]; if (free(p.r + p.h, p.c, p.w, 1)) cands.push({ nw: p.w, nh: p.h + 1, apply: () => { set(p.r + p.h, p.c, p.w, 1, i); p.h++; } }); }
          if (c < cols - 1 && grid[r][c + 1] !== -1) { const i = grid[r][c + 1], p = place[i]; if (free(p.r, c, 1, p.h)) cands.push({ nw: p.w + 1, nh: p.h, apply: () => { set(p.r, c, 1, p.h, i); p.c = c; p.w++; } }); }
          if (r < R - 1 && grid[r + 1] && grid[r + 1][c] !== -1) { const i = grid[r + 1][c], p = place[i]; if (free(r, p.c, p.w, 1)) cands.push({ nw: p.w, nh: p.h + 1, apply: () => { set(r, p.c, p.w, 1, i); p.r = r; p.h++; } }); }
          if (cands.length) {
            cands.sort((a, b) => Math.max(a.nw, a.nh) - Math.max(b.nw, b.nh) || (a.nw * a.nh) - (b.nw * b.nh));
            cands[0].apply();
          }
        }
      }
      return place;
    }

    function relayout() {
      const cards = [...GRID.querySelectorAll('.card')];
      if (!cards.length) return;
      const cols = (getComputedStyle(GRID).gridTemplateColumns.match(/\S+/g) || ['x']).length;
      const items = cards.map(el => {
        const s = el.classList.contains('card--lg') ? 'lg' : el.classList.contains('card--md') ? 'md' : 'sm';
        return { w: SIZE_WH[s][0], h: SIZE_WH[s][1] };
      });
      const place = packBento(items, cols);
      cards.forEach((el, i) => {
        const p = place[i];
        if (!p) return;
        el.style.gridColumn = `${p.c + 1} / span ${p.w}`;
        el.style.gridRow = `${p.r + 1} / span ${p.h}`;
      });
    }

    /* ── WIDGETS: cada tipo devuelve el texto vivo a mostrar en la tarjeta ──
       Para añadir uno nuevo: implementa WIDGETS[tipo] y declara "widget" en
       projects.json. Si falla, la tarjeta queda igual (degradación elegante). */
    const WIDGETS = {
      async gamecalendar(cfg) {
        const r = await fetch(cfg.url, { cache: 'no-cache' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const m = await r.json();
        const n = (m.total_games || 0).toLocaleString('es-ES');
        return `${n} juegos indexados`;
      },
    };

    async function loadWidgets(data) {
      await Promise.all(data.map(async (p) => {
        if (!p.widget || !WIDGETS[p.widget.type]) return;
        const card = GRID.querySelector(`.card[data-pid="${CSS.escape(p.id)}"]`);
        const el = card && card.querySelector('[data-live]');
        if (!el) return;
        try {
          el.textContent = await WIDGETS[p.widget.type](p.widget);
          el.hidden = false;
        } catch (err) {
          console.warn('Widget', p.widget.type, 'falló:', err);
        }
      }));
    }

    async function initProjects() {
      let data;
      try {
        data = await (await fetch('projects.json', { cache: 'no-cache' })).json();
      } catch (err) {
        GRID.innerHTML = `<p style="grid-column:1/-1;font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-faint);padding:20px">No se pudo cargar projects.json</p>`;
        console.error('projects.json:', err);
        return;
      }

      const { proj, util } = renderCards(data);
      relayout();
      let rt;
      window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(relayout, 150); });
      setupCardWarp();
      syncUptime();
      setInterval(syncUptime, 5 * 60 * 1000);
      loadWidgets(data);

      document.getElementById('status-bar').textContent =
        `◉ ${proj} proyectos · ${util} utilidades · ${SEASONS[season].icon} ${SEASONS[season].label} · press ↵ to explore`;
    }

    initProjects();

    // Register PWA Service Worker for the portal
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then((reg) => console.log('Portal Service Worker registered successfully.', reg))
          .catch((err) => console.error('Portal Service Worker registration failed.', err));
      });
    }
  </script>

</body>

</html>
